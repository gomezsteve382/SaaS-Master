openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: downloads
    description: Download counter operations
  - name: anthropic
    description: Anthropic AI chat operations
  - name: vehicleJobs
    description: Vehicle Job + Module Swap workflow operations
  - name: unlockCoverage
    description: SRT Lab unlock-coverage runtime stats from the Python dispatcher
  - name: auth29Detections
    description: UDS 0x29 (Authentication) detection records — modules confirmed to require 0x29 instead of 0x27
  - name: signalDiscovery
    description: |
      Signal Discovery (Task #625) — ports the TUMFTM "Holistic Approach for
      Automated Reverse Engineering of UDS Data" methodology (DOI
      10.3390/wevj16070384, Apache-2.0). Persists ECU/DID sweeps, recorded
      experiments tying DIDs to ground-truth OBD-II PIDs, and the resulting
      labelled DID catalog — all scoped per VIN.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /downloads/{id}:
    get:
      operationId: getDownloadCount
      tags: [downloads]
      summary: Get global download count
      description: Returns the lifetime download count for a given asset id.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadCount"
    post:
      operationId: incrementDownloadCount
      tags: [downloads]
      summary: Increment global download count
      description: Atomically increments and returns the lifetime download count for a given asset id.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadCount"
  /anthropic/conversations:
    get:
      operationId: listAnthropicConversations
      tags: [anthropic]
      summary: List all conversations
      parameters:
        - name: scope
          in: query
          required: false
          schema:
            type: string
          description: Optional scope key — when set, only conversations created with this scope are returned.
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicConversation"
    post:
      operationId: createAnthropicConversation
      tags: [anthropic]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnthropicConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"
  /anthropic/conversations/{id}:
    get:
      operationId: getAnthropicConversation
      tags: [anthropic]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
    delete:
      operationId: deleteAnthropicConversation
      tags: [anthropic]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
  /anthropic/conversations/{id}/messages:
    get:
      operationId: listAnthropicMessages
      tags: [anthropic]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicMessage"
    post:
      operationId: sendAnthropicMessage
      tags: [anthropic]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendAnthropicMessageBody"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}
  /anthropic/module-assistant:
    post:
      operationId: moduleAssistantChat
      tags: [anthropic]
      summary: Stateless module assistant chat (SSE stream)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModuleAssistantChatBody"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}
  /vehicle-jobs:
    get:
      operationId: listVehicleJobs
      tags: [vehicleJobs]
      summary: List vehicle jobs
      parameters:
        - name: vin
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of vehicle jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/VehicleJob"
                required:
                  - jobs
    post:
      operationId: createVehicleJob
      tags: [vehicleJobs]
      summary: Create or upsert a vehicle job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleJobUpsert"
      responses:
        "200":
          description: Created/updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleJob"
  /vehicle-jobs/{id}:
    get:
      operationId: getVehicleJob
      tags: [vehicleJobs]
      summary: Get a vehicle job (with recent events)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Vehicle job + events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleJobWithEvents"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
    patch:
      operationId: updateVehicleJob
      tags: [vehicleJobs]
      summary: Patch a vehicle job's mutable fields
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleJobPatch"
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleJob"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
    delete:
      operationId: deleteVehicleJob
      tags: [vehicleJobs]
      summary: Delete a vehicle job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /unlock-coverage/stats:
    get:
      operationId: getUnlockCoverageStats
      tags: [unlockCoverage]
      summary: Live unlock-coverage stats from the Python dispatcher
      description: |
        Spawns the SRT Lab Python dispatcher (srtlab_unlock_catalog) and
        returns the live native_count / emulated_count / entry_count /
        algo_family_count it computes by walking MODULE_INFO and the
        NATIVE callable table at request time. The SRT Lab UI prefers
        these dispatcher numbers over the cached counts in
        unlock_catalog.json so the milestone banner reflects what
        actually resolves at runtime, not what was true when the catalog
        was generated. Result is cached in-process for 60s.
      responses:
        "200":
          description: Live dispatcher stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnlockCoverageStats"
        "503":
          description: Dispatcher unavailable (Python missing, import failed, or timeout)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnlockCoverageStatsError"
  /auth29-detections:
    get:
      operationId: listAuth29Detections
      tags: [auth29Detections]
      summary: List UDS 0x29 detections (newest first)
      parameters:
        - name: vin
          in: query
          required: false
          schema:
            type: string
          description: Optional VIN filter — when set, only detections recorded against this VIN are returned.
      responses:
        "200":
          description: List of detections
          content:
            application/json:
              schema:
                type: object
                properties:
                  detections:
                    type: array
                    items:
                      $ref: "#/components/schemas/Auth29Detection"
                required:
                  - detections
    post:
      operationId: upsertAuth29Detection
      tags: [auth29Detections]
      summary: Record (upsert) a UDS 0x29 detection
      description: |
        Upserts by (vin, tx); the youngest record per ECU per VIN wins.
        VIN is optional — detections that fire from contexts without a
        VIN bound (initAdapter probes, bench warm-ups) are stored under
        the empty-string key so the banner still surfaces them.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Auth29DetectionInput"
      responses:
        "200":
          description: Stored detection
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  detection:
                    $ref: "#/components/schemas/Auth29Detection"
                required:
                  - ok
                  - detection
    delete:
      operationId: deleteAuth29Detections
      tags: [auth29Detections]
      summary: Clear UDS 0x29 detections
      description: |
        Always scoped — `vin` is required so a single user dismissing
        a local banner can never wipe the fleet-wide map. Optionally
        pass `tx` to scope to one address, and `rx` (with `tx`) to
        clear a single (vin, tx, rx) record.
      parameters:
        - name: vin
          in: query
          required: true
          schema:
            type: string
        - name: tx
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 65535
        - name: rx
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 65535
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required:
                  - ok
  /vehicle-jobs/{id}/events:
    get:
      operationId: listVehicleJobEvents
      tags: [vehicleJobs]
      summary: List events for a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/VehicleJobEvent"
                required:
                  - events
    post:
      operationId: appendVehicleJobEvent
      tags: [vehicleJobs]
      summary: Append a workflow event to a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleJobEventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleJobEvent"
  /signal-discovery/sweeps:
    get:
      operationId: listDiscoverySweeps
      tags: [signalDiscovery]
      summary: List discovery sweeps (newest first)
      parameters:
        - name: vin
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of sweeps
          content:
            application/json:
              schema:
                type: object
                properties:
                  sweeps:
                    type: array
                    items:
                      $ref: "#/components/schemas/DiscoverySweep"
                required: [sweeps]
    post:
      operationId: createDiscoverySweep
      tags: [signalDiscovery]
      summary: Create a new sweep
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscoverySweepInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoverySweep"
  /signal-discovery/sweeps/{id}:
    get:
      operationId: getDiscoverySweep
      tags: [signalDiscovery]
      summary: Get a sweep with discovered ECUs and DIDs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sweep with results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoverySweepDetail"
        "404":
          description: Not found
    patch:
      operationId: updateDiscoverySweep
      tags: [signalDiscovery]
      summary: Update sweep status / cursor / summary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscoverySweepUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoverySweep"
    delete:
      operationId: deleteDiscoverySweep
      tags: [signalDiscovery]
      summary: Delete a sweep and its discovered rows
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                required: [ok]
  /signal-discovery/sweeps/{id}/ecus:
    post:
      operationId: appendDiscoveredEcus
      tags: [signalDiscovery]
      summary: Append discovered ECUs (upsert)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ecus:
                  type: array
                  items:
                    $ref: "#/components/schemas/DiscoveredEcuInput"
              required: [ecus]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  inserted: { type: integer }
                required: [ok, inserted]
  /signal-discovery/sweeps/{id}/dids:
    post:
      operationId: appendDiscoveredDids
      tags: [signalDiscovery]
      summary: Append discovered DIDs (upsert)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dids:
                  type: array
                  items:
                    $ref: "#/components/schemas/DiscoveredDidInput"
              required: [dids]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  inserted: { type: integer }
                required: [ok, inserted]
  /signal-discovery/experiments:
    get:
      operationId: listDiscoveryExperiments
      tags: [signalDiscovery]
      summary: List experiments (newest first)
      parameters:
        - name: vin
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  experiments:
                    type: array
                    items:
                      $ref: "#/components/schemas/DiscoveryExperiment"
                required: [experiments]
    post:
      operationId: createDiscoveryExperiment
      tags: [signalDiscovery]
      summary: Create a new experiment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscoveryExperimentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryExperiment"
  /signal-discovery/experiments/{id}:
    get:
      operationId: getDiscoveryExperiment
      tags: [signalDiscovery]
      summary: Get an experiment with all samples
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryExperimentDetail"
        "404":
          description: Not found
    patch:
      operationId: updateDiscoveryExperiment
      tags: [signalDiscovery]
      summary: Update experiment status / timestamps
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscoveryExperimentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryExperiment"
    delete:
      operationId: deleteDiscoveryExperiment
      tags: [signalDiscovery]
      summary: Delete an experiment and its samples
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                required: [ok]
  /signal-discovery/experiments/{id}/samples:
    post:
      operationId: appendDiscoveryExperimentSamples
      tags: [signalDiscovery]
      summary: Append samples (batch)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                samples:
                  type: array
                  items:
                    $ref: "#/components/schemas/DiscoveryExperimentSampleInput"
              required: [samples]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  inserted: { type: integer }
                required: [ok, inserted]
  /signal-discovery/catalog:
    get:
      operationId: listDiscoveryCatalog
      tags: [signalDiscovery]
      summary: List catalog entries
      parameters:
        - name: vin
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: "#/components/schemas/DiscoveryDidCatalogEntry"
                required: [entries]
    post:
      operationId: upsertDiscoveryCatalogEntry
      tags: [signalDiscovery]
      summary: Upsert a catalog entry (PK is vin+tx+did)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscoveryDidCatalogEntryInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryDidCatalogEntry"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    DownloadCount:
      type: object
      properties:
        id:
          type: string
        count:
          type: integer
          minimum: 0
      required:
        - id
        - count
    AnthropicConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        scope:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    AnthropicMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    CreateAnthropicConversationBody:
      type: object
      properties:
        title:
          type: string
        scope:
          type: string
          nullable: true
      required:
        - title
    SendAnthropicMessageBody:
      type: object
      properties:
        content:
          type: string
        moduleContext:
          $ref: "#/components/schemas/ModuleContext"
      required:
        - content
    AnthropicConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        scope:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    ModuleContext:
      type: object
      properties:
        modules:
          type: array
          items:
            type: string
        issues:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        hexSnippets:
          type: array
          items:
            type: string
    AnthropicError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    VehicleJob:
      type: object
      properties:
        id:
          type: string
        vin:
          type: string
        title:
          type: string
          nullable: true
        vehicle:
          type: object
          additionalProperties: true
          nullable: true
        status:
          type: string
        census:
          type: object
          additionalProperties: true
          nullable: true
        fixPlan:
          type: object
          additionalProperties: true
          nullable: true
        signOff:
          type: object
          additionalProperties: true
          nullable: true
        owner:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - vin
        - status
        - createdAt
        - updatedAt
    VehicleJobUpsert:
      type: object
      properties:
        id:
          type: string
        vin:
          type: string
        title:
          type: string
          nullable: true
        vehicle:
          type: object
          additionalProperties: true
          nullable: true
        status:
          type: string
          nullable: true
        owner:
          type: string
          nullable: true
      required:
        - id
        - vin
    VehicleJobPatch:
      type: object
      properties:
        title:
          type: string
          nullable: true
        vehicle:
          type: object
          additionalProperties: true
          nullable: true
        status:
          type: string
          nullable: true
        census:
          type: object
          additionalProperties: true
          nullable: true
        fixPlan:
          type: object
          additionalProperties: true
          nullable: true
        signOff:
          type: object
          additionalProperties: true
          nullable: true
        owner:
          type: string
          nullable: true
    VehicleJobEvent:
      type: object
      properties:
        id:
          type: integer
        jobId:
          type: string
        ts:
          type: string
          format: date-time
        kind:
          type: string
        module:
          type: string
          nullable: true
        payload:
          type: object
          additionalProperties: true
          nullable: true
      required:
        - id
        - jobId
        - ts
        - kind
    VehicleJobEventInput:
      type: object
      properties:
        kind:
          type: string
        module:
