kind = "web"
previewPath = "/"
title = "SRT Lab"
version = "1.0.0"
id = "artifacts/srt-lab"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25456

[services.development]
run = "pnpm --filter @workspace/srt-lab run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/srt-lab", "run", "build" ]
publicDir = "artifacts/srt-lab/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25456"
BASE_PATH = "/"
